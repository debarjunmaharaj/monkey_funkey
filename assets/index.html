<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🐒 Monkey Funkey</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',sans-serif;touch-action:none}
    #c{display:block;position:fixed;top:0;left:0;width:100%;height:100%}
    #ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
    #hud{position:absolute;top:0;left:0;right:0;padding:16px 20px;display:flex;justify-content:space-between;align-items:flex-start}
    .panel{background:rgba(0,0,0,0.45);backdrop-filter:blur(8px);border-radius:14px;border:1px solid rgba(255,255,255,0.12);padding:10px 14px}
    #scoreBox{text-align:center;min-width:140px}
    #scoreLbl{font-size:11px;color:rgba(255,200,100,0.7);letter-spacing:2px;text-transform:uppercase}
    #scoreVal{font-size:34px;font-weight:900;color:#fff;line-height:1;text-shadow:0 0 20px rgba(255,200,0,0.6)}
    #distVal{font-size:13px;color:#ffd700;letter-spacing:1px;margin-top:2px}
    #comboBox{text-align:center;min-width:100px;transition:opacity .3s;opacity:0}
    #comboVal{font-size:22px;font-weight:900;color:#ff6600;text-shadow:0 0 12px #ff6600}
    #comboLbl{font-size:10px;color:rgba(255,160,80,0.7);letter-spacing:1px;text-transform:uppercase}
    #leftPanel{display:flex;flex-direction:column;gap:8px;min-width:110px}
    #rightPanel{display:flex;flex-direction:column;gap:8px;min-width:120px}
    .hlbl{font-size:10px;color:rgba(255,255,255,0.5);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
    #livesRow{display:flex;gap:4px}
    .hrt{font-size:20px;transition:opacity .3s}
    #bmBar{width:100%;height:10px;background:rgba(255,255,255,0.1);border-radius:5px;overflow:hidden;margin-top:2px}
    #bmFill{height:100%;width:0%;background:linear-gradient(90deg,#ff8c00,#ffd700);border-radius:5px;transition:width .15s}
    #puLine{font-size:12px;color:#00ffcc;min-height:16px;text-shadow:0 0 8px #00ffcc;margin-top:4px}
    #shieldIcon{font-size:20px;opacity:0;transition:opacity .3s;margin-top:2px}
    /* Letterbox */
    #lbT,#lbB{position:fixed;left:0;right:0;height:64px;background:#000;z-index:8;transition:transform .35s cubic-bezier(.4,0,.2,1)}
    #lbT{top:0;transform:translateY(-100%)}
    #lbB{bottom:0;transform:translateY(100%)}
    .lb-on #lbT{transform:translateY(0)}
    .lb-on #lbB{transform:translateY(0)}
    /* Overlay screens */
    #overlay{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px)}
    .screen{display:none;flex-direction:column;align-items:center;gap:14px;text-align:center;padding:20px}
    .screen.active{display:flex}
    .gtitle{font-size:64px;font-weight:900;line-height:1;background:linear-gradient(180deg,#ffe066 0%,#ff8c00 55%,#cc2200 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 6px 24px rgba(255,180,0,.5))}
    .gsub{font-size:15px;color:rgba(255,255,255,.65);letter-spacing:4px;text-transform:uppercase}
    .gmix{font-size:12px;color:rgba(255,200,100,.5);letter-spacing:2px;margin-top:-6px}
    .btn{pointer-events:all;cursor:pointer;padding:14px 44px;border-radius:50px;border:none;font-size:17px;font-weight:700;letter-spacing:2px;text-transform:uppercase;transition:transform .15s,box-shadow .15s}
    .btn-primary{background:linear-gradient(135deg,#ffd700,#ff6600);color:#000;box-shadow:0 0 28px rgba(255,180,0,.5),0 4px 14px rgba(0,0,0,.5)}
    .btn-primary:hover{transform:scale(1.06);box-shadow:0 0 44px rgba(255,180,0,.8)}
    .btn-secondary{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25)}
    .btn-secondary:hover{background:rgba(255,255,255,.2);transform:scale(1.03)}
    .ctrl-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;color:rgba(255,255,255,.55);font-size:12px}
    .ctrl-item{display:flex;align-items:center;gap:5px}
    .key{background:rgba(255,255,255,.13);padding:2px 9px;border-radius:5px;border:1px solid rgba(255,255,255,.25);font-size:11px}
    /* Game over */
    .go-title{font-size:52px;font-weight:900;color:#ff3333;text-shadow:0 0 32px #f00}
    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:320px}
    .stat-box{background:rgba(255,255,255,.08);border-radius:12px;padding:12px 16px;border:1px solid rgba(255,255,255,.12)}
    .stat-val{font-size:22px;font-weight:700;color:#ffd700}
    .stat-lbl{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px}
    /* Options */
    .opts-title{font-size:28px;font-weight:700;color:#fff}
    .opt-row{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:320px;background:rgba(255,255,255,.07);border-radius:10px;padding:10px 16px;border:1px solid rgba(255,255,255,.1)}
    .opt-lbl{color:rgba(255,255,255,.8);font-size:14px}
    .toggle{pointer-events:all;cursor:pointer;width:42px;height:24px;border-radius:12px;background:#444;border:none;position:relative;transition:background .2s}
    .toggle.on{background:#ffd700}
    .toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s}
    .toggle.on::after{left:21px}
    .skin-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
    .skin-btn{pointer-events:all;cursor:pointer;padding:8px 14px;border-radius:10px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:13px;transition:all .2s}
    .skin-btn.sel{border-color:#ffd700;background:rgba(255,215,0,.15);color:#ffd700}
    /* Float text */
    #ft{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);font-size:44px;font-weight:900;color:#ffd700;text-shadow:0 0 28px #ffd700;pointer-events:none;z-index:100;opacity:0}
    #worldLbl{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:38px;font-weight:900;color:#fff;letter-spacing:5px;text-shadow:0 0 32px rgba(255,255,255,.8);opacity:0;pointer-events:none;z-index:30;text-transform:uppercase}
    #speedLbl{position:fixed;top:40%;left:50%;transform:translateX(-50%);font-size:22px;font-weight:700;color:#ff3333;text-shadow:0 0 16px #f00;opacity:0;pointer-events:none;z-index:30}
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="lbT"></div><div id="lbB"></div>

<div id="ui">
  <div id="hud">
    <div class="panel" id="leftPanel">
      <div class="hlbl">Lives</div>
      <div id="livesRow"><span class="hrt">❤️</span><span class="hrt">❤️</span><span class="hrt">❤️</span></div>
      <div id="shieldIcon">🛡️</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:7px">
      <div class="panel" id="scoreBox">
        <div id="scoreLbl">Score</div>
        <div id="scoreVal">0</div>
        <div id="distVal">0m</div>
      </div>
      <div class="panel" id="comboBox">
        <div id="comboVal">×1</div>
        <div id="comboLbl">Combo</div>
      </div>
    </div>
    <div class="panel" id="rightPanel">
      <div class="hlbl">Bananas</div>
      <div id="bmBar"><div id="bmFill"></div></div>
      <div id="puLine"></div>
    </div>
  </div>
</div>

<div id="ft"></div>
<div id="worldLbl"></div>
<div id="speedLbl"></div>

<div id="overlay">
  <!-- Start -->
  <div class="screen active" id="sStart">
    <div class="gtitle">MONKEY<br>FUNKEY</div>
    <div class="gsub">Escape The Jungle</div>
    <div class="gmix">Subway Surfers × Temple Run × Jungle Book</div>
    <button class="btn btn-primary" id="btnPlay">🐒 PLAY</button>
    <button class="btn btn-secondary" id="btnOpts">⚙️ OPTIONS</button>
    <div class="ctrl-row">
      <div class="ctrl-item"><span class="key">← →</span> Lanes</div>
      <div class="ctrl-item"><span class="key">↑</span> Jump</div>
      <div class="ctrl-item"><span class="key">↓</span> Slide</div>
      <div class="ctrl-item"><span class="key">SPC</span> Spin</div>
    </div>
  </div>
  <!-- Game Over -->
  <div class="screen" id="sOver">
    <div class="go-title">💀 GAME OVER</div>
    <div style="font-size:26px;color:#fff" id="goScore">0</div>
    <div style="font-size:14px;color:#ffd700" id="goBest">Best: 0</div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-val" id="goDist">0m</div><div class="stat-lbl">Distance</div></div>
      <div class="stat-box"><div class="stat-val" id="goBan">0</div><div class="stat-lbl">Bananas</div></div>
      <div class="stat-box"><div class="stat-val" id="goCombo">0×</div><div class="stat-lbl">Max Combo</div></div>
      <div class="stat-box"><div class="stat-val" id="goWorld">1</div><div class="stat-lbl">World</div></div>
    </div>
    <button class="btn btn-primary" id="btnRetry">🔄 RETRY</button>
    <button class="btn btn-secondary" id="btnMenu">🏠 MENU</button>
  </div>
  <!-- Options -->
  <div class="screen" id="sOpts">
    <div class="opts-title">⚙️ OPTIONS</div>
    <div class="opt-row"><span class="opt-lbl">🔊 Sound FX</span><button class="toggle on" id="togSfx"></button></div>
    <div class="opt-row"><span class="opt-lbl">🎵 Music</span><button class="toggle on" id="togMusic"></button></div>
    <div class="opt-row"><span class="opt-lbl">📳 Screen Shake</span><button class="toggle on" id="togShake"></button></div>
    <div class="opt-row"><span class="opt-lbl">💨 Motion Blur</span><button class="toggle on" id="togBlur"></button></div>
    <div class="opt-row"><span class="opt-lbl">🎬 Letterbox</span><button class="toggle on" id="togLbox"></button></div>
    <div style="color:rgba(255,255,255,.6);font-size:12px;letter-spacing:1px;margin-top:4px">MONKEY SKIN</div>
    <div class="skin-row" id="skinRow"></div>
    <button class="btn btn-secondary" id="btnOptsBack">← BACK</button>
  </div>
</div>

<script>
  const CV=document.getElementById('c');
  const CX=CV.getContext('2d');
  function resize(){CV.width=innerWidth;CV.height=innerHeight;}
  resize();window.addEventListener('resize',resize);

  /* ─── AUDIO ─── */
  const AC=new(window.AudioContext||window.webkitAudioContext)();
  const OPTS={sfx:true,music:true,shake:true,blur:true,lbox:true};
  function tone(f,t,d,v,delay=0){if(!OPTS.sfx)return;const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t;o.frequency.setValueAtTime(f,AC.currentTime+delay);g.gain.setValueAtTime(v,AC.currentTime+delay);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+delay+d);o.start(AC.currentTime+delay);o.stop(AC.currentTime+delay+d+.01);}
  function noise(d,v,freq=300){if(!OPTS.sfx)return;const buf=AC.createBuffer(1,AC.sampleRate*d,AC.sampleRate);const dt=buf.getChannelData(0);for(let i=0;i<dt.length;i++)dt[i]=Math.random()*2-1;const s=AC.createBufferSource(),g=AC.createGain(),f=AC.createBiquadFilter();f.type='bandpass';f.frequency.value=freq;s.buffer=buf;s.connect(f);f.connect(g);g.connect(AC.destination);g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);s.start();s.stop(AC.currentTime+d+.01);}

  const BUFFERS={};
  async function loadSnd(n,u){
    try{
      console.log('Loading sound:', n, 'from:', u);
      const r=await fetch(u);
      if(!r.ok) throw new Error('Fetch failed with status ' + r.status);
      const b=await r.arrayBuffer();
      BUFFERS[n]=await AC.decodeAudioData(b);
      console.log('Sound loaded:', n);
    }catch(e){
      console.error('Load failed:',n,u,e);
      // Fallback: try to load without fetch if possible?
      // Most WebViews require fetch/XHR for decodeAudioData.
    }
  }
  loadSnd('music','gta-san-andreas-abertura-oficial.mp3');
  loadSnd('hit','oh-my-god-bro-ah-hell-nah.mp3');
  loadSnd('bruh','nahi-nahi-saluke-yaha-kuchh-to-gadbad-hai.mp3');
  loadSnd('yooo','Amongus%20Sus.mp3');
  loadSnd('powerup','tmpbxydyrz3.mp3');
  loadSnd('spin','spiderman-meme-song.mp3');
  function playBuf(n,v=0.4,l=false){if(!OPTS.sfx||!BUFFERS[n])return null;const s=AC.createBufferSource(),g=AC.createGain();s.buffer=BUFFERS[n];s.loop=l;g.gain.value=v;s.connect(g);g.connect(AC.destination);s.start();return{s,g};}

  let musicOn=false;let curMusic=null;
  function startMusic(){
    if(!OPTS.music||musicOn)return;musicOn=true;
    curMusic=playBuf('music',0.3,true);
    if(!curMusic){
      const base=[130.8,164.8,196,220,261.6,196,164.8,130.8];
      let i=0;
      function beat(){if(!musicOn||!OPTS.music)return;const f=base[i%base.length];tone(f,'triangle',.18,.06);tone(f*2,'sine',.12,.03,.08);i++;setTimeout(beat,280);}beat();
      function perc(){if(!musicOn||!OPTS.music)return;noise(.05,.04,180);setTimeout(perc,560);}perc();
    }
  }
  function stopMusic(){musicOn=false;if(curMusic){try{curMusic.s.stop();}catch(e){}curMusic=null;}}
  const snd={
    collect:()=>{tone(660+G.combo*30,'sine',.12,.25);tone(880+G.combo*30,'sine',.08,.18,.06);},
    jump:()=>{tone(440,'sine',.18,.22);tone(550,'triangle',.12,.15,.09);},
    slide:()=>{noise(.1,.18,250);tone(200,'sawtooth',.12,.12);},
    hit:()=>{playBuf('hit',0.8);tone(80,'sawtooth',.35,.55);noise(.2,.45,150);},
    bonk:()=>{tone(420,'square',.08,.4);tone(210,'square',.18,.3,.06);},
    woosh:()=>{tone(900,'sawtooth',.12,.18);tone(450,'sawtooth',.12,.14,.07);},
    faaa:()=>{[300,420,560,700,840].forEach((f,i)=>tone(f,'sawtooth',.06+(i*.04),.4+i*.06,i*.07));},
    bruh:()=>{if(!playBuf('bruh',0.8))[320,260,210,165,130].forEach((f,i)=>tone(f,'sawtooth',.14,.6,i*.14));},
    powerup:()=>{if(!playBuf('powerup',0.8))[440,550,660,770,880,1100].forEach((f,i)=>tone(f,'sine',.14,.4,i*.07));},
    skrrrt:()=>{noise(.06,.55,1200);tone(1400,'sawtooth',.28,.45,.06);tone(700,'sawtooth',.2,.3,.2);},
    combo:(n)=>{const f=220+n*55;tone(f,'square',.08,.45);tone(f*1.5,'square',.08,.35,.06);},
    yooo:()=>{if(!playBuf('yooo',0.8))[440,550,660,770,880,1100,1320].forEach((f,i)=>tone(f,'sine',.2,.5,i*.06));noise(.5,.12,100);},
    levelup:()=>{[523,659,784,1047].forEach((f,i)=>tone(f,'triangle',.28,.55,i*.11));},
    spin:()=>{if(!playBuf('spin',0.7))noise(.04,.65,2000);tone(2200,'sawtooth',.35,.75,.06);},
    vine:()=>{tone(330,'sine',.3,.3);tone(440,'sine',.3,.25,.15);tone(550,'sine',.3,.2,.3);},
  };

  /* ─── GAME STATE ─── */
  const G={
    running:false,score:0,dist:0,speed:5.5,baseSpeed:5.5,
    lives:3,shield:false,bananas:0,bananaMeter:0,
    combo:0,maxCombo:0,world:0,tick:0,gameOver:false,
    bestScore:+localStorage.getItem('mfBest')||0,
    totalBananas:0,camShake:0,puType:'',puTime:0,
    spinDash:false,spinTime:0,nearMiss:false,invincible:0,
    hitFlash:0,skin:0,mute:false
  };

  /* ─── SKINS ─── */
  const SKINS=[
    {name:'Classic 🐒',bodyColor:'#8B4513',patchColor:'#D2691E',hatColor:'#1a1a1a',hatBand:'#8B0000'},
    {name:'Golden 🌟',bodyColor:'#B8860B',patchColor:'#FFD700',hatColor:'#4a3000',hatBand:'#ffd700'},
    {name:'Shadow 🖤',bodyColor:'#222',patchColor:'#555',hatColor:'#000',hatBand:'#444'},
    {name:'Jungle 🌿',bodyColor:'#2d5a00',patchColor:'#4CAF50',hatColor:'#1a3300',hatBand:'#39d353'},
    {name:'Ninja 🥷',bodyColor:'#1a1a2e',patchColor:'#16213e',hatColor:'#000',hatBand:'#e94560'},
  ];

  /* ─── WORLDS ─── */
  const WORLDS=[
    {
      name:'JUNGLE CANOPY',
      sky:['#0b1f07','#1a3d10','#2d6e1a','#4a8c28'],
      ground:'#1c3a08',ground2:'#0a1f03',
      path:'#7a5c1a',pathEdge:'rgba(255,255,200,.15)',
      fog:'rgba(10,35,5,.55)',
      sunColor:'#c8ff80',
      fogColor:'rgba(40,80,10,.4)',
      accent:'#5dde30',
      particles:'rgba(100,255,60,.4)',
      ambientLight:'rgba(80,200,30,.04)',
    },
    {
      name:'ANCIENT TEMPLE',
      sky:['#0e0800','#1f1200','#3d2500','#5c3800'],
      ground:'#2e1a00',ground2:'#160c00',
      path:'#5a3d12',pathEdge:'rgba(255,180,50,.15)',
      fog:'rgba(50,28,0,.6)',
      sunColor:'#ff9933',
      fogColor:'rgba(90,45,0,.5)',
      accent:'#ff8c00',
      particles:'rgba(255,140,40,.5)',
      ambientLight:'rgba(120,60,0,.05)',
    },
    {
      name:'VOLCANIC CRATER',
      sky:['#000','#0d0000','#1a0000','#300a00'],
      ground:'#1a0500',ground2:'#050000',
      path:'#3d1a06',pathEdge:'rgba(255,80,0,.2)',
      fog:'rgba(80,15,0,.65)',
      sunColor:'#ff3300',
      fogColor:'rgba(150,20,0,.55)',
      accent:'#ff2200',
      particles:'rgba(255,80,20,.6)',
      ambientLight:'rgba(180,20,0,.06)',
    }
  ];

  /* ─── ENTITIES ─── */
  const obstacles=[],coins=[],npcs=[],envObjects=[],particles=[];

  /* ─── MONKEY POSITION ─── */
  const M={lane:1,laneF:1,y:0,vy:0,onGround:true,sliding:false,slideT:0,anim:0,spinAngle:0};
  const LANES=3;
  function laneX(l){const sp=Math.min(150,CV.width*.2);return CV.width/2+(l-1)*sp;}

  /* ─── PERSPECTIVE ─── */
  const HOR=.32;
  function pz(z){return .15+z*.85;}
  function px(wx,z){const s=pz(z);return CV.width/2+(wx-CV.width/2)*s;}
  function py(wy,z){const h=CV.height,ho=h*HOR;return ho+(wy-ho)*pz(z);}
  function groundAtZ(z){return CV.height-50;}

  /* ─── SPAWN ─── */
  let spawnT=0,coinT=0,npcT=0,envT=0,lavaT=0;

  function spawnObs(){
    if(!G.running)return;
    const w=G.world;
    const types0=['log','branch','web','boulder','trap','arrow','croc','fire'];
    const types1=['pillar','electric','log','branch','boulder','fire','arrow','spikeball'];
    const types2=['lava','ash','fireball','fire','boulder','electric','magmaroc','croc'];
    const pool=w===0?types0:w===1?types1:types2;
    const lane=Math.floor(Math.random()*LANES);
    obstacles.push({lane,z:0,type:pool[Math.floor(Math.random()*pool.length)],alive:true});
  }

  function spawnCoins(){
    if(!G.running)return;
    const lane=Math.floor(Math.random()*LANES);
    const n=3+Math.floor(Math.random()*6);
    const isGem=Math.random()<.08;
    for(let i=0;i<n;i++) coins.push({lane,z:i*.065,alive:true,type:isGem?'gem':'banana'});
  }

  // Extended NPC types
  const NPC_TYPES=['hunter','hunter2','leopard','crocodile','parrot','gorilla','elephant','snake','toucan','baboon'];
  function spawnNPC(){
    if(!G.running)return;
    const pool=G.world===0?['hunter','leopard','parrot','toucan','gorilla','snake']:
               G.world===1?['hunter','hunter2','baboon','crocodile','elephant']:
               ['hunter2','magmaroc_npc','gorilla','baboon','snake'];
    const type=pool[Math.floor(Math.random()*pool.length)];
    const side=Math.random()<.5?-1:1;
    npcs.push({z:0,side,type,alive:true,anim:0,alertShown:false});
  }

  function spawnEnv(){
    if(!G.running)return;
    const side=Math.random()<.5?-1:1;
    const off=.25+Math.random()*.55;
    const types=G.world===0?['tree','tree','tree','vine','rock']:
                 G.world===1?['pillar_bg','ruin','statue','tree']:
                 ['volcano_bg','rock','ember_pillar'];
    const type=types[Math.floor(Math.random()*types.length)];
    envObjects.push({z:0,side,off,type,alive:true,variant:Math.floor(Math.random()*3)});
  }

  /* ─── PARTICLES ─── */
  function spawnParts(x,y,col,n,vs=1){
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2,s=(1+Math.random()*3)*vs;
      particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,color:col,sz:2+Math.random()*5,txt:null});
    }
  }
  function spawnTxt(x,y,t,col='#ffd700',sz=22){
    particles.push({x,y,vx:(Math.random()-.5)*1.5,vy:-3.5-Math.random()*2,life:1,color:col,sz,txt:t});
  }

  /* ─── FLOAT TEXT ─── */
  function floatText(msg,col='#ffd700'){
    const el=document.getElementById('ft');
    el.textContent=msg;el.style.color=col;el.style.textShadow=`0 0 28px ${col}`;
    el.style.cssText+=`;opacity:1;transform:translate(-50%,-60%);transition:none`;
    setTimeout(()=>{el.style.cssText+=`;transition:all .9s;opacity:0;transform:translate(-50%,-110%)`;},80);
  }
  function showWorld(){
    const el=document.getElementById('worldLbl');
    el.textContent=WORLDS[G.world].name;
    el.style.cssText+=';opacity:1;transition:none';
    setTimeout(()=>{el.style.cssText+=';transition:opacity 1.2s;opacity:0';},1600);
  }
  function speedAlert(){
    const el=document.getElementById('speedLbl');
    el.textContent='⚡ FASTER!';el.style.cssText+=';opacity:1;transition:none';
    setTimeout(()=>{el.style.cssText+=';transition:opacity .8s;opacity:0';},700);
  }

  /* ─── LETTERBOX ─── */
  function setLB(on){
    if(!OPTS.lbox)return;
    document.body.classList.toggle('lb-on',on);
  }

  /* ─── HUD ─── */
  function updateHUD(){
    document.getElementById('scoreVal').textContent=Math.floor(G.score).toLocaleString();
    document.getElementById('distVal').textContent=Math.floor(G.dist)+'m';
    const cb=document.getElementById('comboBox');
    if(G.combo>1){cb.style.opacity='1';document.getElementById('comboVal').textContent='×'+G.combo;}
    else cb.style.opacity='0';
    const lr=document.getElementById('livesRow');
    lr.innerHTML='';for(let i=0;i<3;i++)lr.innerHTML+=`<span class="hrt" style="opacity:${i<G.lives?1:.2}">❤️</span>`;
    document.getElementById('bmFill').style.width=(G.bananaMeter)+'%';
    document.getElementById('shieldIcon').style.opacity=G.shield?'1':'0';
    const pu=document.getElementById('puLine');
    if(G.puType&&G.puTime>0){
      const icons={magnet:'🧲',rocket:'🚀',freeze:'⏱️',boots:'👟'};
      pu.textContent=(icons[G.puType]||'✨')+' '+Math.ceil(G.puTime/60)+'s';
    }else pu.textContent='';
  }

  /* ─── POWERUP ─── */
  function activatePU(type){
    G.puType=type;G.puTime=360;snd.powerup();
    const nm={magnet:'🧲 MAGNET PAW!',rocket:'🚀 ROCKET VINE!',freeze:'⏱️ TIME FREEZE!',boots:'👟 SPEED BOOTS!'};
    floatText(nm[type]||'POWER UP!','#00ffcc');
    setLB(true);setTimeout(()=>setLB(false),600);
    if(type==='boots'){G.speed=G.baseSpeed*1.9;snd.skrrrt();}
    if(type==='rocket'){G.invincible=360;snd.vine();}
  }

  /* ─── DAMAGE ─── */
  function takeDmg(){
    if(G.invincible>0)return;
    if(G.shield){G.shield=false;snd.bonk();shake(5);floatText('SHIELD GONE! 🛡️','#00ccff');G.combo=0;return;}
    G.lives--;snd.hit();shake(14);G.combo=0;
    spawnParts(laneX(Math.round(M.laneF)),CV.height-90,'#ff3333',18,1.6);
    G.invincible=90;G.hitFlash=60;
    if(G.lives<=0)endGame();
    else{floatText('OUCH! 💥','#ff4444');setLB(true);setTimeout(()=>setLB(false),400);}
  }

  function shake(amt){if(OPTS.shake)G.camShake=Math.max(G.camShake,amt);}

  /* ─── COLLECT ─── */
  function collect(c){
    G.score+=c.type==='gem'?60:10+(G.combo*.5|0);
    G.totalBananas++;G.bananaMeter=Math.min(100,G.bananaMeter+(c.type==='gem'?18:5));
    G.combo++;if(G.combo>G.maxCombo)G.maxCombo=G.combo;
    snd.collect();
    const s=.3+c.z*.7;
    const cx=CV.width/2+(laneX(c.lane)-CV.width/2)*s;
    const cy=CV.height*HOR+(CV.height-50-CV.height*HOR)*c.z-28*s;
    spawnParts(cx,cy,c.type==='gem'?'#00ffcc':'#ffd700',5,.7);
    spawnTxt(cx,cy-10,c.type==='gem'?'+60💎':'+'+Math.floor(10+G.combo*.5)+'🍌','#ffd700',20*s);
    if(G.combo%10===0&&G.combo>0){snd.combo(G.combo);floatText('COMBO ×'+G.combo+'! 🔥','#ff6600');}
    if(Math.random()<.035)activatePU(['magnet','rocket','freeze','boots'][Math.floor(Math.random()*4)]);
    else if(Math.random()<.05){G.shield=true;snd.bonk();floatText('COCONUT SHIELD! 🥥','#00ffcc');}
  }

  /* ─── INPUT ─── */
  const keys={};
  document.addEventListener('keydown',e=>{
    if(keys[e.code])return;keys[e.code]=true;
    if(!G.running)return;
    if(e.code==='ArrowLeft'||e.code==='KeyA')moveLane(-1);
    if(e.code==='ArrowRight'||e.code==='KeyD')moveLane(1);
    if(e.code==='ArrowUp'||e.code==='KeyW')doJump();
    if(e.code==='ArrowDown'||e.code==='KeyS')doSlide();
    if(e.code==='Space'){e.preventDefault();doSpin();}
  });
  document.addEventListener('keyup',e=>{delete keys[e.code];});
  let tx=0,ty=0;
  document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;AC.resume();},{passive:true});
  document.addEventListener('touchend',e=>{
    if(!G.running)return;
    const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)>Math.abs(dy)){if(dx<-25)moveLane(-1);else if(dx>25)moveLane(1);}
    else{if(dy<-25)doJump();else if(dy>25)doSlide();}
  },{passive:true});

  function moveLane(d){
    const n=M.laneF+d;if(n<0||n>2)return;
    M.laneF=n;snd.woosh();
    spawnParts(laneX(M.laneF),CV.height-90,'rgba(255,255,255,.4)',6,.5);
  }
  function doJump(){
    if(!M.onGround)return;
    M.vy=-19;M.onGround=false;M.sliding=false;snd.jump();
    spawnParts(laneX(Math.round(M.laneF)),CV.height-90,'rgba(255,255,255,.35)',10,.9);
  }
  function doSlide(){
    if(!M.onGround)return;
    M.sliding=true;M.slideT=32;snd.slide();
    spawnParts(laneX(Math.round(M.laneF)),CV.height-75,'rgba(180,120,40,.5)',8,.8);
  }
  function doSpin(){
    if(G.bananaMeter<100)return;
    G.bananaMeter=0;G.spinDash=true;G.spinTime=130;G.invincible=130;
    snd.spin();floatText('SPIN DASH! 🌀','#ffd700');setLB(true);shake(9);
    setTimeout(()=>setLB(false),500);
  }

  /* ─── GAME CONTROL ─── */
  function startGame(){
    Object.assign(G,{running:true,score:0,dist:0,speed:G.baseSpeed,lives:3,shield:false,
      bananas:0,bananaMeter:0,combo:0,maxCombo:0,world:0,tick:0,gameOver:false,
      totalBananas:0,camShake:0,puType:'',puTime:0,spinDash:false,spinTime:0,
      invincible:0,hitFlash:0,nearMiss:false});
    obstacles.length=0;coins.length=0;npcs.length=0;envObjects.length=0;particles.length=0;
    Object.assign(M,{lane:1,laneF:1,y:0,vy:0,onGround:true,sliding:false,slideT:0,anim:0,spinAngle:0});
    spawnT=0;coinT=0;npcT=0;envT=0;
    document.getElementById('overlay').style.display='none';
    snd.levelup();showWorld();startMusic();
    requestAnimationFrame(loop);
  }
  function endGame(){
    G.running=false;G.gameOver=true;stopMusic();snd.bruh();
    if(G.score>G.bestScore){G.bestScore=G.score;localStorage.setItem('mfBest',G.score);setTimeout(()=>{snd.yooo();floatText('NEW BEST! 🏆','#ffd700');},800);}
    setTimeout(()=>{
      document.getElementById('overlay').style.display='flex';
      showScreen('sOver');
      document.getElementById('goScore').textContent='Score: '+Math.floor(G.score).toLocaleString();
      document.getElementById('goBest').textContent='Best: '+Math.floor(G.bestScore).toLocaleString();
      document.getElementById('goDist').textContent=Math.floor(G.dist)+'m';
      document.getElementById('goBan').textContent=G.totalBananas;
      document.getElementById('goCombo').textContent=G.maxCombo+'×';
      document.getElementById('goWorld').textContent=['Jungle','Temple','Volcano'][G.world];
    },1100);
  }
  function showScreen(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  /* ─── MAIN LOOP ─── */
  let lastT=0,bgOff=0;
  function loop(ts){
    if(!G.running)return;
    const dt=Math.min((ts-lastT)/16.67,3);lastT=ts;
    update(dt);render();
    requestAnimationFrame(loop);
  }

  function update(dt){
    G.tick+=dt;bgOff+=G.speed*dt;
    const prevDist=G.dist;
    G.dist+=G.speed*dt*.05;
    G.score+=G.speed*dt*.1*(1+G.combo*.04);

    // Speed
    G.speed=Math.min(28,G.baseSpeed+G.dist*.0018);

    // World
    const nw=G.dist<6000?0:G.dist<16000?1:2;
    if(nw!==G.world){G.world=nw;showWorld();snd.levelup();}

    // Speed alert
    if(Math.floor(G.dist/1500)!==Math.floor(prevDist/1500)&&G.dist>200)speedAlert();

    // Monkey physics
    M.lane+=(M.laneF-M.lane)*.16*dt;
    if(!M.onGround){M.vy+=.85*dt;M.y+=M.vy*dt;if(M.y>=0){M.y=0;M.vy=0;M.onGround=true;}}
    if(M.sliding){M.slideT-=dt;if(M.slideT<=0)M.sliding=false;}
    M.anim+=dt;
    if(G.spinDash){G.spinTime-=dt;M.spinAngle+=.45*dt;if(G.spinTime<=0)G.spinDash=false;}
    if(G.invincible>0)G.invincible-=dt;
    if(G.hitFlash>0)G.hitFlash-=dt;
    if(G.camShake>0)G.camShake*=.87;

    // Powerup timer
    if(G.puType&&G.puTime>0){
      G.puTime-=dt;
      if(G.puTime<=0){if(G.puType==='boots')G.speed=Math.min(28,G.baseSpeed+G.dist*.0018);if(G.puType==='rocket'){}G.puType='';}
    }

    // Spawn
    const spd=G.puType==='freeze'?.12:1;
    const zSpd=.016*dt*(G.speed/G.baseSpeed)*spd;

    spawnT-=dt;if(spawnT<=0){const inv=Math.max(18,55-G.speed*1.2);spawnT=inv*(.6+Math.random()*.8);spawnObs();}
    coinT-=dt;if(coinT<=0){coinT=35+Math.random()*25;spawnCoins();}
    npcT-=dt;if(npcT<=0){npcT=90+Math.random()*80;spawnNPC();}
    envT-=dt;if(envT<=0){envT=6+Math.random()*5;spawnEnv();}

    // Update obstacles
    obstacles.forEach(o=>{
      if(!o.alive)return;
      o.z+=zSpd;
      if(o.z>1.08){o.alive=false;return;}
      if(o.z>.72&&o.z<1.02&&Math.abs(M.laneF-o.lane)<.52&&G.invincible<=0){
        const isLow=o.type==='branch'||o.type==='web'||o.type==='spikeball';
        const isFloor=o.type==='log'||o.type==='fire'||o.type==='lava'||o.type==='croc'||o.type==='trap'||o.type==='magmaroc';
        let hit=false;
        if(isLow&&!M.sliding)hit=true;
        else if(isFloor&&M.y>-20)hit=true;
        else if(!isLow&&!isFloor)hit=true;
        if(hit){
          if(G.spinDash){o.alive=false;snd.spin();spawnParts(CV.width/2,CV.height-90,'#ffd700',22,2.2);}
          else{
            // near miss
            if(Math.abs(M.laneF-o.lane)>.25&&Math.abs(M.laneF-o.lane)<.52&&o.z>.8&&!G.nearMiss){
              G.nearMiss=true;snd.faaa();floatText('NEAR MISS! 😱','#ff8c00');
              spawnParts(CV.width/2,CV.height-90,'#ff8c00',12,1.2);
            } else if(Math.abs(M.laneF-o.lane)<.3){
              o.alive=false;takeDmg();
            }
          }
        }
      }
      if(o.z>.99)G.nearMiss=false;
    });

    // Coins
    coins.forEach(c=>{
      if(!c.alive)return;
      c.z+=zSpd*.97;
      if(c.z>1.08){c.alive=false;return;}
      if(G.puType==='magnet'&&c.z>.4)c.lane+=(M.laneF-c.lane)*.11*dt;
      if(c.z>.75&&c.z<1.02&&Math.abs(M.laneF-c.lane)<.6){c.alive=false;collect(c);}
    });

    // NPCs
    npcs.forEach(n=>{if(!n.alive)return;n.z+=zSpd*.88;n.anim+=dt;if(n.z>1.1)n.alive=false;});

    // Env
    envObjects.forEach(e=>{if(!e.alive)return;e.z+=zSpd*.95;if(e.z>1.08)e.alive=false;});

    // Particles
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.life-=.025;});

    updateHUD();
  }

  /* ─── RENDER ─── */
  function render(){
    const W=CV.width,H=CV.height;
    CX.clearRect(0,0,W,H);
    CX.save();
    if(G.camShake>.4)CX.translate(Math.sin(G.tick*2.3)*G.camShake,Math.cos(G.tick*3.1)*G.camShake*.6);

    drawSky(W,H);
    drawGround(W,H);
    drawPath(W,H);
    drawAtmosphere(W,H);

    // Z-sort everything
    const drawList=[
      ...envObjects.filter(e=>e.alive).map(e=>({z:e.z,fn:()=>drawEnv(e)})),
      ...npcs.filter(n=>n.alive).map(n=>({z:n.z,fn:()=>drawNPC(n)})),
      ...obstacles.filter(o=>o.alive&&o.z<.6).map(o=>({z:o.z,fn:()=>drawObs(o)})),
      ...coins.filter(c=>c.alive).map(c=>({z:c.z,fn:()=>drawCoin(c)})),
    ].sort((a,b)=>a.z-b.z);
    drawList.forEach(d=>d.fn());

    drawMonkey(W,H);

    obstacles.filter(o=>o.alive&&o.z>=.6).sort((a,b)=>a.z-b.z).forEach(drawObs);

    drawParticles();
    drawSpeedFX(W,H);

    CX.restore();
  }

  /* ─── SKY ─── */
  function drawSky(W,H){
    const wd=WORLDS[G.world];
    const hor=H*HOR;
    const sk=CX.createLinearGradient(0,0,0,hor+H*.08);
    wd.sky.forEach((c,i)=>sk.addColorStop(i/(wd.sky.length-1),c));
    CX.fillStyle=sk;CX.fillRect(0,0,W,hor+H*.08);

    // Stars for world 2
    if(G.world===2){
      CX.fillStyle='rgba(255,255,255,.7)';
      for(let i=0;i<120;i++){
        const sx=((i*137.5+bgOff*.08)%W+W)%W;
        const sy=(i*97.3)%(hor*.85);
        const sz=.4+Math.sin(G.tick*.03+i)*.3;
        CX.beginPath();CX.arc(sx,sy,sz,0,Math.PI*2);CX.fill();
      }
      // Lava glow on horizon
      const lg=CX.createLinearGradient(0,hor-30,0,hor+H*.06);
      lg.addColorStop(0,'transparent');lg.addColorStop(.5,'rgba(255,40,0,.35)');lg.addColorStop(1,'transparent');
      CX.fillStyle=lg;CX.fillRect(0,hor-30,W,H*.1);
    }

    // Sun / moon
    const sunX=W*.75,sunY=hor*.35;
    if(G.world===0){
      // Green jungle sun
      CX.save();CX.globalAlpha=.7;
      CX.shadowBlur=60;CX.shadowColor='#c8ff80';
      CX.fillStyle='#e8ffaa';CX.beginPath();CX.arc(sunX,sunY,28,0,Math.PI*2);CX.fill();
      CX.shadowBlur=0;CX.restore();
      // Light rays
      CX.save();CX.globalAlpha=.05;
      for(let r=0;r<8;r++){
        const a=r*Math.PI*.25+G.tick*.002;
        CX.strokeStyle='#c8ff80';CX.lineWidth=18;
        CX.beginPath();CX.moveTo(sunX+Math.cos(a)*30,sunY+Math.sin(a)*30);
        CX.lineTo(sunX+Math.cos(a)*180,sunY+Math.sin(a)*180);CX.stroke();
      }
      CX.restore();
    } else if(G.world===1){
      CX.save();CX.globalAlpha=.65;CX.shadowBlur=50;CX.shadowColor='#ff8c00';
      CX.fillStyle='#ff9933';CX.beginPath();CX.arc(sunX,sunY,22,0,Math.PI*2);CX.fill();
      CX.shadowBlur=0;CX.restore();
    } else {
      // Red moon
      CX.save();CX.globalAlpha=.5;CX.shadowBlur=40;CX.shadowColor='#ff2200';
      CX.fillStyle='#cc1100';CX.beginPath();CX.arc(W*.25,hor*.3,18,0,Math.PI*2);CX.fill();
      CX.shadowBlur=0;CX.restore();
    }

    // Birds (world 0)
    if(G.world===0){
      for(let b=0;b<4;b++){
        const bx=((bgOff*.4+b*200)%W+W)%W;
        const byy=hor*.2+Math.sin(G.tick*.04+b)*20;
        const wing=Math.sin(G.tick*.25+b)*8;
        CX.save();CX.globalAlpha=.35;CX.strokeStyle='#c8ffaa';CX.lineWidth=1.5;
        CX.beginPath();CX.moveTo(bx-8,byy+wing);CX.lineTo(bx,byy);CX.lineTo(bx+8,byy+wing);CX.stroke();
        CX.restore();
      }
    }
    // Embers (world 2)
    if(G.world===2){
      for(let e=0;e<15;e++){
        const ex=((e*173+bgOff*.6)%W+W)%W;
        const ey=hor*(.05+.8*(((e*97+G.tick*.4)%100)/100));
        const ea=.2+.8*(1-ey/hor);
        CX.save();CX.globalAlpha=ea*.5;CX.fillStyle='#ff4400';
        CX.beginPath();CX.arc(ex,ey,1.2+Math.sin(G.tick*.1+e),0,Math.PI*2);CX.fill();
        CX.restore();
      }
    }
  }

  /* ─── GROUND ─── */
  function drawGround(W,H){
    const wd=WORLDS[G.world];const hor=H*HOR;
    const gg=CX.createLinearGradient(0,hor,0,H);
    gg.addColorStop(0,wd.ground);gg.addColorStop(1,wd.ground2);
    CX.fillStyle=gg;CX.fillRect(0,hor,W,H-hor);

    // Ground texture strips
    CX.globalAlpha=.15;
    for(let i=0;i<6;i++){
      const z=.15+i*.14;const yy=hor+(H-hor)*z;
      CX.fillStyle=i%2===0?'rgba(255,255,255,.08)':'rgba(0,0,0,.12)';
      CX.fillRect(0,yy,W,2);
    }
    CX.globalAlpha=1;

    // World-specific ground detail
    if(G.world===2){
      // Lava veins
      for(let v=0;v<3;v++){
        const zy=.3+v*.25;const yy=hor+(H-hor)*zy;
        CX.save();CX.globalAlpha=.25+Math.sin(G.tick*.08+v)*.1;
        CX.strokeStyle='#ff3300';CX.lineWidth=2;
        const vg=CX.createLinearGradient(0,yy,W,yy);
        vg.addColorStop(0,'transparent');vg.addColorStop(.3,'#ff4400');vg.addColorStop(.7,'#ff2200');vg.addColorStop(1,'transparent');
        CX.strokeStyle=vg;
        CX.beginPath();CX.moveTo(0,yy);
        for(let x=0;x<W;x+=40)CX.lineTo(x,yy+Math.sin((x+bgOff*v)*.02)*4);
        CX.stroke();CX.restore();
      }
    }
  }

  /* ─── PATH ─── */
  function drawPath(W,H){
    const wd=WORLDS[G.world];const hor=H*HOR;
    const vx=W/2,vy=hor;const rw=W*.52;

    // Road shadow
    CX.save();CX.globalAlpha=.3;
    CX.beginPath();CX.moveTo(vx-12,vy);CX.lineTo(vx+12,vy);CX.lineTo(vx+rw*.55,H);CX.lineTo(vx-rw*.55,H);CX.closePath();
    CX.fillStyle='rgba(0,0,0,.5)';CX.fill();CX.restore();

    // Main road
    CX.beginPath();CX.moveTo(vx-6,vy);CX.lineTo(vx+6,vy);CX.lineTo(vx+rw/2,H);CX.lineTo(vx-rw/2,H);CX.closePath();
    const rg=CX.createLinearGradient(0,vy,0,H);
    rg.addColorStop(0,wd.path+'88');rg.addColorStop(1,wd.path);
    CX.fillStyle=rg;CX.fill();

    // Lane lines
    CX.setLineDash([22,22]);
    for(let l=1;l<LANES;l++){
      const fx=vx+(l/LANES-.5)*rw*.04;const bx=vx+(l/LANES-.5)*rw;
      CX.strokeStyle=wd.pathEdge;CX.lineWidth=2;
      CX.beginPath();CX.moveTo(fx,vy+4);CX.lineTo(bx,H-2);CX.stroke();
    }
    CX.setLineDash([]);

    // Road edges
    CX.strokeStyle=`rgba(255,255,255,.22)`;CX.lineWidth=3;
    CX.beginPath();CX.moveTo(vx-6,vy);CX.lineTo(vx-rw/2,H);CX.stroke();
    CX.beginPath();CX.moveTo(vx+6,vy);CX.lineTo(vx+rw/2,H);CX.stroke();

    // Distance markers on road
    for(let m=0;m<5;m++){
      const mz=((G.dist*.003+m*.2)%1);const my=hor+(H-hor)*mz;const mw=(rw/2)*mz;
      CX.save();CX.globalAlpha=.07*mz;CX.strokeStyle='#fff';CX.lineWidth=1.5;
      CX.beginPath();CX.moveTo(vx-mw,my);CX.lineTo(vx+mw,my);CX.stroke();CX.restore();
    }
  }

  /* ─── ATMOSPHERE ─── */
  function drawAtmosphere(W,H){
    const wd=WORLDS[G.world];const hor=H*HOR;
    // Depth fog
    const fg=CX.createLinearGradient(0,hor-20,0,hor+H*.18);
    fg.addColorStop(0,'transparent');fg.addColorStop(1,wd.fog);
    CX.fillStyle=fg;CX.fillRect(0,hor-20,W,H*.22);
    // Side vignette
    const lv=CX.createLinearGradient(0,0,W*.25,0);
    lv.addColorStop(0,'rgba(0,0,0,.5)');lv.addColorStop(1,'transparent');
    CX.fillStyle=lv;CX.fillRect(0,0,W*.25,H);
    const rv=CX.createLinearGradient(W,0,W*.75,0);
    rv.addColorStop(0,'rgba(0,0,0,.5)');rv.addColorStop(1,'transparent');
    CX.fillStyle=rv;CX.fillRect(W*.75,0,W*.25,H);
    // Bottom vignette
    const bv=CX.createLinearGradient(0,H,0,H*.85);
    bv.addColorStop(0,'rgba(0,0,0,.6)');bv.addColorStop(1,'transparent');
    CX.fillStyle=bv;CX.fillRect(0,H*.85,W,H*.15);
  }

  /* ─── ENV OBJECTS ─── */
  function drawEnv(e){
    const W=CV.width,H=CV.height;const hor=H*HOR;
    const z=e.z;const s=.08+z*.38;
    const side=e.side*(W*.23+W*.22*e.off);
    const ox=W/2+side*s*(1/(.5+z*.5));
    const gy=hor+(H-hor)*z;
    CX.save();CX.globalAlpha=.12+z*.65;

    if(e.type==='tree'){
      const th=110*s;
      CX.fillStyle='#3d1f00';CX.fillRect(ox-4*s,gy-th,8*s,th);
      // Layered canopy
      const leafColors=['#0d3300','#1a5500','#2d8822','#3daa33'];
      for(let i=3;i>=0;i--){
        CX.fillStyle=leafColors[i];
        const r=(22+i*8)*s;const ly=gy-th+(i*12)*s;
        CX.beginPath();CX.arc(ox,ly,r,0,Math.PI*2);CX.fill();
      }
      // Highlights
      CX.globalAlpha*=.4;CX.fillStyle='rgba(200,255,150,.3)';
      CX.beginPath();CX.arc(ox-5*s,gy-th-5*s,10*s,0,Math.PI);CX.fill();
    } else if(e.type==='vine'){
      CX.strokeStyle='rgba(30,100,10,.7)';CX.lineWidth=2*s;
      CX.beginPath();CX.moveTo(ox,gy-120*s);
      CX.bezierCurveTo(ox+20*s,gy-80*s,ox-15*s,gy-40*s,ox+10*s,gy);
      CX.stroke();
      CX.fillStyle='#2d7a18';
      for(let l=0;l<4;l++){CX.beginPath();CX.ellipse(ox+(l%2===0?8:-8)*s,gy-(30+l*25)*s,8*s,5*s,.5,0,Math.PI*2);CX.fill();}
    } else if(e.type==='rock'){
      CX.fillStyle='#2a2a2a';
      CX.beginPath();CX.ellipse(ox,gy-8*s,20*s,12*s,0,0,Math.PI*2);CX.fill();
      CX.fillStyle='#444';CX.beginPath();CX.ellipse(ox-3*s,gy-12*s,14*s,8*s,-.2,0,Math.PI*2);CX.fill();
    } else if(e.type==='pillar_bg'){
      const pw=18*s;const ph=140*s;
      const pg=CX.createLinearGradient(ox-pw,0,ox+pw,0);
      pg.addColorStop(0,'#4a3820');pg.addColorStop(.4,'#8B7355');pg.addColorStop(1,'#3a2810');
      CX.fillStyle=pg;CX.fillRect(ox-pw,gy-ph,pw*2,ph);
      CX.fillStyle='#6a5535';CX.fillRect(ox-pw*1.3,gy-ph,pw*2.6,ph*.08);
      CX.fillRect(ox-pw*1.3,gy-ph*.06,pw*2.6,ph*.06);
      // Carvings
      CX.globalAlpha*=.5;CX.fillStyle='rgba(0,0,0,.4)';
      for(let i=1;i<4;i++)CX.fillRect(ox-pw,gy-ph*(i/4),pw*2,2);
    } else if(e.type==='ruin'){
      CX.fillStyle='#5a4025';
      CX.fillRect(ox-25*s,gy-30*s,50*s,30*s);
      CX.fillStyle='#3d2810';CX.fillRect(ox-28*s,gy-32*s,56*s,5*s);
      CX.fillStyle='rgba(0,0,0,.5)';
      CX.fillRect(ox-8*s,gy-22*s,16*s,22*s);// door
      CX.fillRect(ox-20*s,gy-26*s,10*s,10*s);// window L
      CX.fillRect(ox+10*s,gy-26*s,10*s,10*s);// window R
    } else if(e.type==='statue'){
      // Idol statue
      CX.fillStyle='#5C4A1E';CX.fillRect(ox-8*s,gy-60*s,16*s,60*s);
      CX.fillStyle='#6B5830';CX.beginPath();CX.arc(ox,gy-65*s,12*s,0,Math.PI*2);CX.fill();
      CX.fillStyle='#ff0';CX.beginPath();CX.arc(ox-4*s,gy-68*s,3*s,0,Math.PI*2);CX.fill();
      CX.beginPath();CX.arc(ox+4*s,gy-68*s,3*s,0,Math.PI*2);CX.fill();
    } else if(e.type==='volcano_bg'){
      const vw=60*s;const vh=100*s;
      const vg=CX.createLinearGradient(ox,gy-vh,ox,gy);
      vg.addColorStop(0,'#1a0500');vg.addColorStop(1,'#0a0000');
      CX.fillStyle=vg;
      CX.beginPath();CX.moveTo(ox,gy-vh);CX.lineTo(ox-vw,gy);CX.lineTo(ox+vw,gy);CX.closePath();CX.fill();
      // Crater glow
      CX.save();CX.globalAlpha*=.6+Math.sin(G.tick*.06)*.2;
      CX.fillStyle='#ff3300';CX.beginPath();CX.ellipse(ox,gy-vh+5*s,10*s,4*s,0,0,Math.PI*2);CX.fill();
      CX.restore();
    } else if(e.type==='ember_pillar'){
      CX.fillStyle='#2a1000';CX.fillRect(ox-6*s,gy-80*s,12*s,80*s);
      // Ember glow top
      CX.save();CX.globalAlpha*=.8;CX.shadowBlur=15;CX.shadowColor='#ff4400';
      CX.fillStyle='#ff6600';CX.beginPath();CX.arc(ox,gy-82*s,7*s,0,Math.PI*2);CX.fill();
      CX.shadowBlur=0;CX.restore();
    }
    CX.restore();
  }

  /* ─── OBSTACLES ─── */
  function drawObs(o){
    const W=CV.width,H=CV.height;const hor=H*HOR;
    const z=o.z;const s=.28+z*.72;
    const lx=laneX(o.lane);const ox=W/2+(lx-W/2)*pz(z);
    const gy=hor+(H-50-hor)*z;
    CX.save();CX.globalAlpha=.18+z*.82;
    const t=G.tick;

    if(o.type==='log'){
      const w=58*s,h=22*s;
      CX.fillStyle='#4a2800';CX.beginPath();CX.ellipse(ox,gy-h/2,w,h/2,0,0,Math.PI*2);CX.fill();
      const lg=CX.createLinearGradient(ox-w,gy-h,ox+w,gy);
      lg.addColorStop(0,'#8B5E3C');lg.addColorStop(.5,'#A06840');lg.addColorStop(1,'#6B4428');
      CX.fillStyle=lg;CX.fillRect(ox-w,gy-h,w*2,h);
      CX.fillStyle='#C49A6C';CX.beginPath();CX.ellipse(ox,gy-h,w,h/2,0,0,Math.PI*2);CX.fill();
      CX.strokeStyle='#3d2008';CX.lineWidth=1;CX.stroke();
      // Rings
      for(let r=0;r<3;r++){CX.strokeStyle='rgba(80,40,10,.4)';CX.lineWidth=1;CX.beginPath();CX.ellipse(ox,gy-h,w*(1-r*.15),h/2*(1-r*.15),0,0,Math.PI*2);CX.stroke();}
    } else if(o.type==='branch'){
      const w=90*s;
      CX.strokeStyle='#3d1f00';CX.lineWidth=16*s;CX.lineCap='round';
      CX.beginPath();CX.moveTo(ox-w,gy-85*s);CX.lineTo(ox+w,gy-85*s);CX.stroke();
      CX.strokeStyle='#6B3E16';CX.lineWidth=10*s;CX.stroke();
      CX.strokeStyle='rgba(180,140,80,.2)';CX.lineWidth=3;CX.stroke();
      for(let i=-4;i<=4;i++){
        CX.fillStyle=`rgba(${20+i*3},${90+i*5},${10+i*2},.85)`;
        CX.beginPath();CX.ellipse(ox+i*20*s,gy-96*s,13*s,7*s,-.2+(i*.05),0,Math.PI*2);CX.fill();
        if(i%2===0){CX.fillStyle='rgba(80,180,30,.3)';CX.beginPath();CX.ellipse(ox+i*20*s+5*s,gy-102*s,7*s,5*s,.1,0,Math.PI*2);CX.fill();}
      }
    } else if(o.type==='boulder'){
      const r=32*s;
      const bg=CX.createRadialGradient(ox-r*.3,gy-r*1.4,r*.08,ox,gy-r,r);
      bg.addColorStop(0,'#999');bg.addColorStop(.5,'#555');bg.addColorStop(1,'#222');
      CX.fillStyle=bg;CX.beginPath();CX.arc(ox,gy-r,r,0,Math.PI*2);CX.fill();
      CX.strokeStyle='rgba(0,0,0,.3)';CX.lineWidth=1.5;CX.stroke();
      CX.strokeStyle='rgba(255,255,255,.1)';CX.lineWidth=1;
      CX.beginPath();CX.moveTo(ox-5*s,gy-r*1.55);CX.lineTo(ox+9*s,gy-r*.75);CX.stroke();
      CX.beginPath();CX.moveTo(ox-12*s,gy-r);CX.lineTo(ox-3*s,gy-r*.4);CX.stroke();
    } else if(o.type==='trap'){
      CX.strokeStyle='#5a0000';CX.lineWidth=3*s;
      for(let i=-3;i<=3;i++){CX.beginPath();CX.moveTo(ox+i*11*s,gy);CX.lineTo(ox+i*11*s-4*s,gy-28*s);CX.lineTo(ox+i*11*s+4*s,gy-28*s);CX.closePath();CX.fillStyle='#8B0000';CX.fill();CX.strokeStyle='#ff0000';CX.stroke();}
      CX.fillStyle='rgba(255,0,0,.2)';CX.beginPath();CX.ellipse(ox,gy-5*s,36*s,8*s,0,0,Math.PI*2);CX.fill();
    } else if(o.type==='arrow'){
      CX.save();CX.translate(ox,gy-55*s);CX.rotate(.25+Math.sin(t*.05)*.05);
      CX.fillStyle='#8B4513';CX.fillRect(-2.5*s,-22*s,5*s,44*s);
      CX.fillStyle='#ccc';CX.beginPath();CX.moveTo(0,-28*s);CX.lineTo(-9*s,-14*s);CX.lineTo(9*s,-14*s);CX.closePath();CX.fill();
      CX.fillStyle='#8B4513';CX.fillRect(-6*s,20*s,5*s,3*s);CX.fillRect(1*s,20*s,5*s,3*s);
      CX.restore();
    } else if(o.type==='web'){
      const wr=32*s;
      CX.strokeStyle='rgba(220,220,220,.65)';CX.lineWidth=1.5;
      for(let a=0;a<8;a++){const ang=a*Math.PI/4;CX.beginPath();CX.moveTo(ox,gy-wr);CX.lineTo(ox+Math.cos(ang)*wr,gy-wr+Math.sin(ang)*wr);CX.stroke();}
      for(let r=6;r<=wr;r+=9){CX.beginPath();CX.arc(ox,gy-wr,r,0,Math.PI*2);CX.stroke();}
      // Spider
      CX.fillStyle='#111';CX.beginPath();CX.arc(ox+wr*.5,gy-wr*.7,5*s,0,Math.PI*2);CX.fill();
      for(let l=0;l<4;l++){CX.beginPath();CX.moveTo(ox+wr*.5,gy-wr*.7);CX.lineTo(ox+wr*.5+(l-1.5)*7*s,gy-wr*.7-8*s);CX.strokeStyle='#333';CX.lineWidth=1;CX.stroke();}
    } else if(o.type==='croc'){
      const cg=CX.createLinearGradient(ox-35*s,gy,ox+35*s,gy);
      cg.addColorStop(0,'#1a4a00');cg.addColorStop(.5,'#2d8000');cg.addColorStop(1,'#1a4a00');
      CX.fillStyle=cg;CX.beginPath();CX.ellipse(ox,gy-10*s,38*s,13*s,0,0,Math.PI*2);CX.fill();
      // Scales
      for(let sc=0;sc<6;sc++){CX.fillStyle='rgba(0,60,0,.4)';CX.beginPath();CX.arc(ox-25*s+sc*10*s,gy-15*s,4*s,0,Math.PI);CX.fill();}
      CX.fillStyle='#ffe44d';CX.beginPath();CX.arc(ox-12*s,gy-21*s,4.5*s,0,Math.PI*2);CX.fill();
      CX.beginPath();CX.arc(ox+12*s,gy-21*s,4.5*s,0,Math.PI*2);CX.fill();
      CX.fillStyle='#000';CX.beginPath();CX.arc(ox-12*s,gy-21*s,2.5*s,0,Math.PI*2);CX.fill();
      CX.beginPath();CX.arc(ox+12*s,gy-21*s,2.5*s,0,Math.PI*2);CX.fill();
      CX.fillStyle='#fff';for(let i=-4;i<=4;i++){CX.beginPath();CX.moveTo(ox+i*8*s,gy-3*s);CX.lineTo(ox+i*8*s-3*s,gy+9*s);CX.lineTo(ox+i*8*s+3*s,gy+9*s);CX.closePath();CX.fill();}
    } else if(o.type==='fire'){
      for(let f=2;f>=0;f--){
        const fh=(38+f*14)*s;const fw=(18-f*2)*s;const flk=Math.sin(t*.28+f)*.18;
        const fireG=CX.createRadialGradient(ox,gy,0,ox,gy-fh*.5,fh);
        fireG.addColorStop(0,f===0?'rgba(255,255,200,.95)':f===1?'rgba(255,140,0,.85)':'rgba(255,40,0,.7)');
        fireG.addColorStop(1,'transparent');
        CX.fillStyle=fireG;
        CX.beginPath();CX.moveTo(ox-fw,gy);
        CX.bezierCurveTo(ox-fw/2,gy-fh*.5,ox+fw*flk,gy-fh,ox,gy-fh*1.1);
        CX.bezierCurveTo(ox-fw*flk,gy-fh,ox+fw/2,gy-fh*.5,ox+fw,gy);
        CX.closePath();CX.fill();
      }
    } else if(o.type==='pillar'){
      const pw=22*s;const ph=130*s;
      const pg=CX.createLinearGradient(ox-pw,0,ox+pw,0);
      pg.addColorStop(0,'#3a2800');pg.addColorStop(.3,'#8B7355');pg.addColorStop(.7,'#A08060');pg.addColorStop(1,'#4a3820');
      CX.fillStyle=pg;CX.fillRect(ox-pw,gy-ph,pw*2,ph);
      CX.fillStyle='#C8A870';CX.fillRect(ox-pw*1.35,gy-ph,pw*2.7,ph*.07);
      CX.fillRect(ox-pw*1.35,gy-ph*.055,pw*2.7,ph*.055);
      CX.fillRect(ox-pw*1.35,gy-ph*.035,pw*2.7,ph*.035);
    } else if(o.type==='electric'){
      CX.save();CX.shadowBlur=14;CX.shadowColor='#66aaff';
      const cols=['rgba(120,180,255,.3)','rgba(80,140,255,.7)','#aaccff'];
      for(let li=0;li<3;li++){
        CX.strokeStyle=cols[li];CX.lineWidth=(3-li)*s;
        CX.beginPath();let ex=ox-30*s,ey=gy-40*s;CX.moveTo(ex,ey);
        for(let seg=0;seg<10;seg++){ex+=(6+Math.random()*8)*s*(seg%2?1:-1);ey+=8*s;CX.lineTo(ex,ey);}
        CX.stroke();
      }
      CX.shadowBlur=0;CX.restore();
    } else if(o.type==='spikeball'){
      CX.fillStyle='#333';CX.beginPath();CX.arc(ox,gy-18*s,16*s,0,Math.PI*2);CX.fill();
      CX.strokeStyle='#888';CX.lineWidth=2*s;
      for(let sp=0;sp<8;sp++){const a=sp*Math.PI/4+t*.05;CX.beginPath();CX.moveTo(ox+Math.cos(a)*16*s,gy-18*s+Math.sin(a)*16*s);CX.lineTo(ox+Math.cos(a)*28*s,gy-18*s+Math.sin(a)*28*s);CX.stroke();}
      CX.fillStyle='#666';for(let sp=0;sp<8;sp++){const a=sp*Math.PI/4+t*.05;CX.beginPath();CX.moveTo(ox+Math.cos(a)*27*s,gy-18*s+Math.sin(a)*27*s);CX.lineTo(ox+Math.cos(a+.2)*22*s,gy-18*s+Math.sin(a+.2)*22*s);CX.lineTo(ox+Math.cos(a-.2)*22*s,gy-18*s+Math.sin(a-.2)*22*s);CX.closePath();CX.fill();}
    } else if(o.type==='lava'){
      const lv=.3+Math.sin(t*.08)*.08;
      CX.fillStyle=`rgba(255,${Math.floor(40+lv*30)},0,.9)`;
      CX.beginPath();CX.ellipse(ox,gy-6*s,48*s,14*s,0,0,Math.PI*2);CX.fill();
      CX.fillStyle='rgba(255,160,40,.7)';CX.beginPath();CX.ellipse(ox+6*s,gy-10*s,28*s,8*s,.15,0,Math.PI*2);CX.fill();
      // Bubbles
      for(let b=0;b<3;b++){const bx=ox+(b-1)*14*s;const by=gy-((G.tick*.06*b)%12)*s-2*s;CX.beginPath();CX.arc(bx,by,3*s,0,Math.PI*2);CX.fillStyle='rgba(255,100,0,.5)';CX.fill();}
    } else if(o.type==='ash'){
      CX.fillStyle='rgba(80,80,80,.7)';CX.beginPath();CX.arc(ox,gy-32*s,28*s,0,Math.PI*2);CX.fill();
      CX.fillStyle='rgba(110,110,110,.5)';CX.beginPath();CX.arc(ox+12*s,gy-52*s,18*s,0,Math.PI*2);CX.fill();
      CX.fillStyle='rgba(60,60,60,.6)';CX.beginPath();CX.arc(ox-8*s,gy-48*s,14*s,0,Math.PI*2);CX.fill();
    } else if(o.type==='fireball'){
      const fb=Math.sin(t*.2)*.12;
      CX.save();CX.shadowBlur=20;CX.shadowColor='#ff4400';
      const fg=CX.createRadialGradient(ox,gy-22*s,0,ox,gy-22*s,24*s);
      fg.addColorStop(0,'rgba(255,255,200,.95)');fg.addColorStop(.4,'rgba(255,120,0,.85)');fg.addColorStop(1,'transparent');
      CX.fillStyle=fg;CX.beginPath();CX.arc(ox,gy-22*s,24*s,0,Math.PI*2);CX.fill();
      CX.shadowBlur=0;CX.restore();
    } else if(o.type==='magmaroc'){
      // Rock monster
      CX.fillStyle='#1a0500';CX.beginPath();CX.arc(ox,gy-22*s,28*s,0,Math.PI*2);CX.fill();
      // Lava cracks
      CX.strokeStyle='rgba(255,80,0,.8)';CX.lineWidth=2;
      for(let cr=0;cr<5;cr++){const ca=cr*Math.PI*.4;CX.beginPath();CX.moveTo(ox,gy-22*s);CX.lineTo(ox+Math.cos(ca)*28*s,gy-22*s+Math.sin(ca)*28*s);CX.stroke();}
      CX.fillStyle='#ff3300';CX.beginPath();CX.arc(ox-8*s,gy-28*s,5*s,0,Math.PI*2);CX.fill();
      CX.beginPath();CX.arc(ox+8*s,gy-28*s,5*s,0,Math.PI*2);CX.fill();
    }
    CX.restore();
  }

  /* ─── COINS ─── */
  function drawCoin(c){
    const W=CV.width,H=CV.height;const hor=H*HOR;
    const z=c.z;const s=.22+z*.78;
    const lx=laneX(c.lane);const ox=W/2+(lx-W/2)*pz(z);
    const gy=hor+(H-50-hor)*z-32*s;
    const bob=Math.sin(G.tick*.22+c.lane*1.5)*6*s;
    CX.save();CX.globalAlpha=.25+z*.75;
    if(c.type==='gem'){
      CX.save();CX.shadowBlur=12;CX.shadowColor='#00ffcc';
      CX.fillStyle='#00ffcc';CX.beginPath();
      CX.moveTo(ox,gy-14*s+bob);CX.lineTo(ox+11*s,gy+bob);CX.lineTo(ox,gy+11*s+bob);CX.lineTo(ox-11*s,gy+bob);
      CX.closePath();CX.fill();
      CX.fillStyle='rgba(255,255,255,.5)';CX.beginPath();
      CX.moveTo(ox,gy-14*s+bob);CX.lineTo(ox+5*s,gy+bob);CX.lineTo(ox,gy-4*s+bob);CX.closePath();CX.fill();
      CX.shadowBlur=0;CX.restore();
    } else {
      CX.save();CX.shadowBlur=7;CX.shadowColor='#ffd700';
      const bg=CX.createRadialGradient(ox-3*s,gy-3*s+bob,1,ox,gy+bob,9*s);
      bg.addColorStop(0,'#fff8c0');bg.addColorStop(.5,'#ffd700');bg.addColorStop(1,'#b8860b');
      CX.fillStyle=bg;CX.beginPath();CX.arc(ox,gy+bob,9*s,0,Math.PI*2);CX.fill();
      CX.fillStyle='rgba(255,255,255,.45)';CX.beginPath();CX.arc(ox-3*s,gy-3*s+bob,3*s,0,Math.PI*2);CX.fill();
      CX.shadowBlur=0;CX.restore();
    }
    CX.restore();
  }

  /* ─── NPCs ─── */
  function drawNPC(n){
    const W=CV.width,H=CV.height;const hor=H*HOR;
    const z=n.z;const s=.3+z*.7;
    const gy=hor+(H-50-hor)*z;
    const lo=n.side*(W*.22+W*.1);
    const ox=W/2+lo*pz(z)*(1/(.5+z*.5));
    CX.save();CX.globalAlpha=.18+z*.82;
    const t=G.tick;const bob=Math.sin(t*.22)*3;

    if(n.type==='hunter'||n.type==='hunter2'){
      const isH2=n.type==='hunter2';
      // Body
      const bodyG=CX.createLinearGradient(ox-12*s,gy-60*s,ox+12*s,gy);
      bodyG.addColorStop(0,isH2?'#3a2000':'#5C4A1E');bodyG.addColorStop(1,isH2?'#220a00':'#3a2800');
      CX.fillStyle=bodyG;CX.beginPath();CX.ellipse(ox,gy-30*s+bob,11*s,20*s,0,0,Math.PI*2);CX.fill();
      // Head
      CX.fillStyle='#F5CBA7';CX.beginPath();CX.arc(ox,gy-56*s+bob,11*s,0,Math.PI*2);CX.fill();
      // Hat
      CX.fillStyle=isH2?'#000':'#3d2f00';
      CX.beginPath();CX.ellipse(ox,gy-65*s+bob,13*s,3.5*s,0,0,Math.PI*2);CX.fill();
      CX.fillRect(ox-7*s,gy-78*s+bob,14*s,14*s);
      if(isH2){CX.fillStyle='#8B0000';CX.fillRect(ox-7*s,gy-68*s+bob,14*s,2.5*s);}
      // Eyes
      CX.fillStyle='#222';CX.beginPath();CX.arc(ox-4*s,gy-57*s+bob,2*s,0,Math.PI*2);CX.fill();
      CX.beginPath();CX.arc(ox+4*s,gy-57*s+bob,2*s,0,Math.PI*2);CX.fill();
      // Weapon
      const wx=ox+(n.side*16*s);
      if(isH2){
        // Net + spear
        CX.strokeStyle='#8B4513';CX.lineWidth=3.5*s;CX.lineCap='round';
        CX.beginPath();CX.moveTo(wx,gy-55*s+bob);CX.lineTo(wx,gy-6*s+bob);CX.stroke();
        CX.fillStyle='#ccc';CX.beginPath();CX.moveTo(wx,gy-60*s+bob);CX.lineTo(wx-6*s,gy-50*s+bob);CX.lineTo(wx+6*s,gy-50*s+bob);CX.closePath();CX.fill();
        // Dangling net
        CX.strokeStyle='rgba(180,180,180,.6)';CX.lineWidth=1;
        for(let ni=0;ni<3;ni++){CX.beginPath();CX.moveTo(ox+(n.side*(8+ni*4))*s,gy-40*s+bob);CX.lineTo(ox+(n.side*(6+ni*5))*s,gy-18*s+bob);CX.stroke();}
      } else {

  /* ─── MONKEY BACK VIEW ─── */
  function drawMonkey(W,H){
    const sk=SKINS[G.skin||0];
    const lx=laneX(M.laneF);
    const by=H-58;const my=by+M.y;
    const s=1.3;const t=G.tick;

    CX.save();
    if(G.camShake>.5)CX.translate(Math.sin(t*2.2)*G.camShake*.3,Math.cos(t*3)*G.camShake*.2);
    if(G.hitFlash>0&&Math.floor(G.hitFlash/4)%2===0)CX.globalAlpha=.25;

    // Motion blur
    if(OPTS.blur&&G.speed>11&&M.onGround){
      CX.save();CX.globalAlpha=.1;
      for(let b=1;b<=4;b++)drawMonkeyBack(lx-b*9,my,s,sk,t,false);
      CX.restore();
    }

    if(G.spinDash){
      CX.save();CX.translate(lx,my);CX.rotate(M.spinAngle);
      drawMonkeyBack(0,0,s,sk,t,true);
      CX.restore();
    } else {
      drawMonkeyBack(lx,my,s,sk,t,false);
    }
    CX.restore();
  }

  function drawMonkeyBack(x,y,s,sk,t,spin){
    const runBob=M.onGround?Math.sin(t*.22)*3.5:0;
    const runBobX=M.onGround?Math.sin(t*.11)*2:0;
    const armSwing=M.onGround?Math.sin(t*.22)*20:0;
    const legSwing=M.onGround?Math.sin(t*.22)*22:0;

    CX.save();
    CX.translate(x+runBobX,y+runBob);
    if(M.sliding){CX.scale(1,0.58);CX.translate(0,20);}

    // Ground shadow
    CX.save();CX.translate(0,16);CX.scale(1,.22);
    CX.beginPath();CX.arc(0,0,28*s,0,Math.PI*2);
    CX.fillStyle='rgba(0,0,0,.32)';CX.fill();CX.restore();

    // === BACK VIEW — monkey running away from camera ===

    // Tail (visible from back)
    if(!M.sliding&&!spin){
      CX.strokeStyle=sk.bodyColor;CX.lineWidth=5*s;CX.lineCap='round';
      const tailCurl=Math.sin(t*.14)*15;
      CX.beginPath();
      CX.moveTo(0,-2*s);
      CX.bezierCurveTo(18*s,-10*s,30*s+tailCurl,-28*s,18*s,-50*s);
      CX.stroke();
      // Tail tip
      CX.fillStyle=sk.patchColor;CX.beginPath();CX.arc(18*s,-50*s,4.5*s,0,Math.PI*2);CX.fill();
    }

    // Legs (back of legs visible)
    if(!M.sliding&&!spin){
      // Left leg
      CX.save();CX.translate(-9*s,2*s);CX.rotate((-legSwing)*Math.PI/180);
      const llg=CX.createLinearGradient(0,0,0,22*s);llg.addColorStop(0,sk.bodyColor);llg.addColorStop(1,'#3d1800');
      CX.fillStyle=llg;CX.beginPath();CX.roundRect(-5.5*s,0,11*s,22*s,4);CX.fill();
      // Foot
      CX.fillStyle=sk.patchColor;CX.beginPath();CX.ellipse(0,22*s,7*s,4*s,0,0,Math.PI*2);CX.fill();
      CX.restore();
      // Right leg
      CX.save();CX.translate(9*s,2*s);CX.rotate((legSwing)*Math.PI/180);
      CX.fillStyle=llg;CX.beginPath();CX.roundRect(-5.5*s,0,11*s,22*s,4);CX.fill();
      CX.fillStyle=sk.patchColor;CX.beginPath();CX.ellipse(0,22*s,7*s,4*s,0,0,Math.PI*2);CX.fill();
      CX.restore();
    }

    // Body — back torso
    const bodyG=CX.createLinearGradient(-20*s,-42*s,20*s,2*s);
    bodyG.addColorStop(0,lighten(sk.bodyColor,.15));bodyG.addColorStop(.5,sk.bodyColor);bodyG.addColorStop(1,'#2a0e00');
    CX.fillStyle=bodyG;
    CX.beginPath();CX.ellipse(0,-20*s,20*s,24*s,0,0,Math.PI*2);CX.fill();

    // Back fur texture lines
    CX.save();CX.globalAlpha=.18;CX.strokeStyle='#000';CX.lineWidth=.8;
    for(let fl=0;fl<5;fl++){CX.beginPath();CX.moveTo(-18*s+fl*8*s,-42*s);CX.lineTo(-20*s+fl*9*s,0);CX.stroke();}
    CX.restore();

    // Arms
    if(!M.sliding&&!spin){
      // Left arm (swings forward/back)
      CX.save();CX.translate(-19*s,-30*s);CX.rotate((-armSwing-8)*Math.PI/180);
      const ag=CX.createLinearGradient(0,0,0,28*s);ag.addColorStop(0,sk.bodyColor);ag.addColorStop(1,'#2a0e00');
      CX.fillStyle=ag;CX.beginPath();CX.roundRect(-5*s,0,10*s,28*s,4);CX.fill();
      CX.fillStyle=sk.patchColor;CX.beginPath();CX.ellipse(0,28*s,7*s,5*s,0,0,Math.PI*2);CX.fill();
      CX.restore();
      // Right arm
      CX.save();CX.translate(19*s,-30*s);CX.rotate((armSwing+8)*Math.PI/180);
      CX.fillStyle=ag;CX.beginPath();CX.roundRect(-5*s,0,10*s,28*s,4);CX.fill();
      CX.fillStyle=sk.patchColor;CX.beginPath();CX.ellipse(0,28*s,7*s,5*s,0,0,Math.PI*2);CX.fill();
      CX.restore();
    }

    // HEAD — back view (we see the back of head + hat)
    CX.save();
    const headBob2=M.onGround?Math.sin(t*.11)*2:0;
    CX.translate(0,-46*s+headBob2);

    // Back of head
    const hg=CX.createRadialGradient(-5*s,-5*s,2,0,0,22*s);
    hg.addColorStop(0,lighten(sk.bodyColor,.2));hg.addColorStop(.7,sk.bodyColor);hg.addColorStop(1,'#1a0800');
    CX.fillStyle=hg;CX.beginPath();CX.arc(0,0,20*s,0,Math.PI*2);CX.fill();

    // Ears (visible from back, slightly to sides)
    CX.fillStyle=sk.bodyColor;CX.beginPath();CX.arc(-19*s,-1*s,7*s,0,Math.PI*2);CX.fill();
    CX.fillStyle=sk.patchColor;CX.beginPath();CX.arc(-19*s,-1*s,4*s,0,Math.PI*2);CX.fill();
    CX.fillStyle=sk.bodyColor;CX.beginPath();CX.arc(19*s,-1*s,7*s,0,Math.PI*2);CX.fill();
    CX.fillStyle=sk.patchColor;CX.beginPath();CX.arc(19*s,-1*s,4*s,0,Math.PI*2);CX.fill();

    // Hat (back rim visible)
    if(!spin){
      CX.fillStyle=sk.hatColor;
      CX.beginPath();CX.ellipse(0,-17*s,17*s,5*s,0,0,Math.PI*2);CX.fill();
      CX.fillRect(-11*s,-32*s,22*s,16*s);
      CX.fillStyle=sk.hatBand;CX.fillRect(-11*s,-22*s,22*s,3.5*s);
      CX.fillStyle='rgba(255,255,255,.08)';CX.fillRect(-11*s,-32*s,22*s,3*s);
    }

    CX.restore();// head

    // Shield glow ring
    if(G.shield){
      CX.beginPath();CX.arc(0,-20*s,38*s,0,Math.PI*2);
      CX.strokeStyle=`rgba(0,180,255,${.45+Math.sin(G.tick*.18)*.25})`;
      CX.lineWidth=3.5;CX.stroke();
      CX.lineWidth=9;CX.strokeStyle='rgba(0,120,255,.12)';CX.stroke();
    }

    CX.restore();
  }

  function lighten(hex,amt){
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return `rgb(${Math.min(255,r+(amt*255)|0)},${Math.min(255,g+(amt*255)|0)},${Math.min(255,b+(amt*255)|0)})`;
  }

  /* ─── PARTICLES ─── */
  function drawParticles(){
    particles.forEach(p=>{
      if(p.life<=0)return;
      CX.save();CX.globalAlpha=p.life;
      if(p.txt){
        CX.font=`bold ${p.sz}px Arial`;CX.textAlign='center';
        CX.fillStyle=p.color;CX.shadowBlur=6;CX.shadowColor=p.color;
        CX.fillText(p.txt,p.x,p.y);CX.shadowBlur=0;
      } else {
        CX.fillStyle=p.color;CX.beginPath();CX.arc(p.x,p.y,p.sz,0,Math.PI*2);CX.fill();
      }
      CX.restore();
    });
    for(let i=particles.length-1;i>=0;i--){if(particles[i].life<=0)particles.splice(i,1);}
  }

  /* ─── SPEED FX ─── */
  function drawSpeedFX(W,H){
    const spd=G.speed;
    if(spd>13){
      const al=Math.min(.55,(spd-13)/15);
      const vg=CX.createRadialGradient(W/2,H/2,H*.15,W/2,H/2,H*.7);
      vg.addColorStop(0,'transparent');vg.addColorStop(1,`rgba(0,0,0,${al})`);
      CX.fillStyle=vg;CX.fillRect(0,0,W,H);
      // Speed streaks
      if(spd>17){
        CX.save();CX.globalAlpha=(spd-17)/15*.35;
        for(let i=0;i<24;i++){
          const a=(i/24)*Math.PI*2+G.tick*.04;
          const r1=H*.28,r2=H*.52+Math.random()*H*.1;
          CX.strokeStyle='rgba(255,255,255,.6)';CX.lineWidth=.8;
          CX.beginPath();CX.moveTo(W/2+Math.cos(a)*r1,H/2+Math.sin(a)*r1);CX.lineTo(W/2+Math.cos(a)*r2,H/2+Math.sin(a)*r2);CX.stroke();
        }
        CX.restore();
      }
    }
    // Banana meter glow
    if(G.bananaMeter>=100){
      CX.save();CX.globalAlpha=.15+Math.sin(G.tick*.2)*.08;
      CX.fillStyle='#ffd700';CX.fillRect(0,0,W,H);CX.restore();
    }
    // Powerup overlay
    if(G.puType==='freeze'){
      CX.save();CX.globalAlpha=.06+Math.sin(G.tick*.1)*.02;
      CX.fillStyle='#0088ff';CX.fillRect(0,0,W,H);CX.restore();
    }
  }

  /* ─── UI BUTTONS ─── */
  document.getElementById('btnPlay').addEventListener('click',()=>{AC.resume();startGame();});
  document.getElementById('btnRetry').addEventListener('click',()=>{AC.resume();startGame();});
  document.getElementById('btnMenu').addEventListener('click',()=>{
    document.getElementById('overlay').style.display='flex';
    showScreen('sStart');stopMusic();
  });
  document.getElementById('btnOpts').addEventListener('click',()=>showScreen('sOpts'));
  document.getElementById('btnOptsBack').addEventListener('click',()=>showScreen('sStart'));

  // Toggles
  function makeToggle(id,key){
    const el=document.getElementById(id);
    el.addEventListener('click',()=>{OPTS[key]=!OPTS[key];el.classList.toggle('on',OPTS[key]);if(key==='music'){if(OPTS.music)startMusic();else stopMusic();}});
  }
  makeToggle('togSfx','sfx');makeToggle('togMusic','music');makeToggle('togShake','shake');
  makeToggle('togBlur','blur');makeToggle('togLbox','lbox');

  // Skins
  const sr=document.getElementById('skinRow');
  SKINS.forEach((sk,i)=>{
    const b=document.createElement('button');b.className='skin-btn'+(i===0?' sel':'');
    b.textContent=sk.name;b.addEventListener('click',()=>{
      G.skin=i;document.querySelectorAll('.skin-btn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');
    });sr.appendChild(b);
  });

  // Draw start placeholder
  CX.fillStyle='#0b1f07';CX.fillRect(0,0,CV.width,CV.height);
  CX.fillStyle='#ffd700';CX.font='bold 52px Arial';CX.textAlign='center';
  CX.fillText('🐒 MONKEY FUNKEY',CV.width/2,CV.height/2);
  CX.font='18px Arial';CX.fillStyle='rgba(255,255,200,.65)';
  CX.fillText('Press PLAY to begin!',CV.width/2,CV.height/2+55);

  // roundRect polyfill
  if(!CanvasRenderingContext2D.prototype.roundRect){
    CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
      this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);
      this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);this.lineTo(x+r,y+h);
      this.quadraticCurveTo(x,y+h,x,y+h-r);this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);
      this.closePath();
    };
  }
</script>
</body>
